<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back - PetXpert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #faf8ff; }
        h1, h2 { font-family: 'Hanken Grotesk', sans-serif; }
        .bg-primary { background-color: #003fb1; }
        .text-primary { color: #003fb1; }
        @keyframes slide-in-right {
            0% { transform: translateX(120%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes fade-out {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.9); }
        }
        .toast-slide-in {
            animation: slide-in-right 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .toast-fade-out {
            animation: fade-out 0.25s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-4xl w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">
        <!-- Left Side: Visual -->
        <div class="md:w-1/2 bg-primary relative overflow-hidden flex items-center justify-center p-12">
            <div class="absolute inset-0 opacity-40">
                <img src="https://images.unsplash.com/photo-1576201836106-db1758fd1c97?auto=format&fit=crop&q=80&w=800" alt="Veterinary Care" class="w-full h-full object-cover">
            </div>
            <div class="relative z-10 text-white">
                <div class="flex items-center gap-2 mb-8">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-primary">
                        <i data-lucide="paw-print" class="w-6 h-6"></i>
                    </div>
                    <span class="text-2xl font-bold">PetXpert</span>
                </div>
                <h1 class="text-4xl font-bold leading-tight">Welcome back</h1>
                <p class="text-blue-100 mt-4 text-lg">Log in to manage your pet's clinical heart data.</p>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="md:w-1/2 p-12 flex flex-col justify-center">
            <h2 class="text-3xl font-bold text-gray-900 mb-8">Sign In</h2>
            
            <form id="signinForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="email" id="email" required class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="you@clinical.com">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="password" id="password" required class="w-full pl-12 pr-12 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="••••••••">
                    </div>
                    <div class="flex justify-end mt-2">
                        <a href="#" class="text-xs text-primary font-bold hover:underline">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-800 transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-100">
                    <span>Sign In</span>
                    <i data-lucide="log-in" class="w-5 h-5"></i>
                </button>

                <p class="text-center text-sm text-gray-500 mt-8">
                    Don't have an account? <a href="/signup/" class="text-primary font-bold hover:underline">Sign Up</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Local Toast Notification System
        function showToast(message, type = 'success', duration = 4000) {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = `toast-slide-in pointer-events-auto flex items-center gap-3 p-4 rounded-xl border bg-white shadow-xl max-w-sm w-full transition-all duration-300`;
            
            let borderClass = 'border-green-100';
            let iconColor = 'text-green-600';
            let iconName = 'check-circle';
            
            if (type === 'error') {
                borderClass = 'border-red-100';
                iconColor = 'text-red-600';
                iconName = 'alert-circle';
            } else if (type === 'warning') {
                borderClass = 'border-yellow-100';
                iconColor = 'text-yellow-500';
                iconName = 'alert-triangle';
            } else if (type === 'info') {
                borderClass = 'border-blue-100';
                iconColor = 'text-blue-600';
                iconName = 'info';
            }
            
            toast.classList.add(borderClass);

            toast.innerHTML = `
                <div class="flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center ${iconColor} bg-opacity-10 bg-current">
                    <i data-lucide="${iconName}" class="w-5 h-5"></i>
                </div>
                <div class="flex-1 text-sm font-semibold text-gray-800">${message}</div>
                <button class="text-gray-400 hover:text-gray-600 flex-shrink-0" onclick="this.parentElement.classList.add('toast-fade-out'); setTimeout(() => this.parentElement.remove(), 250)">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            `;

            container.appendChild(toast);
            
            if (window.lucide) {
                window.lucide.createIcons();
            }

            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.add('toast-fade-out');
                    setTimeout(() => {
                        if (toast.parentElement) {
                            toast.remove();
                        }
                    }, 250);
                }
            }, duration);
        }

        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Signing in...';

            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/signin/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', result.access);
                    localStorage.setItem('refresh_token', result.refresh);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    if (result.user.role === 'VETERINARIAN') {
                        if (result.user.is_profile_complete) {
                            window.location.href = '/veterinarians/';
                        } else {
                            window.location.href = '/veterinarian/complete-profile/';
                        }
                    } else {
                        window.location.href = '/veterinarians/';
                    }
                } else {
                    showToast(result.error || 'Invalid credentials', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>Sign In</span><i data-lucide="log-in" class="w-5 h-5"></i>';
                    lucide.createIcons();
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Connection error', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Sign In</span><i data-lucide="log-in" class="w-5 h-5"></i>';
                lucide.createIcons();
            }
        });
    </script>
    <!-- Global Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none max-w-sm w-full"></div>
</body>
</html>
